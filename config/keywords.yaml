negative_score_reducers:
  # Phase B6: graduated reducers (hard / medium / standard)
  hard:
    score: -40
    terms:
      - "HRIS analyst"
      - "HRIS administrator"
      - "Workday HCM configurator"
      - "SuccessFactors admin"
      - "SuccessFactors administrator"   # Phase E2
      - "assessment scientist"            # Phase E2
      - "selection scientist"             # Phase E2
  medium:
    score: -25
    terms:
      - "market research"
      - "brand strategy"
      # "change management consultant" only penalized without listening/analytics co-term
      - "change management consultant"
  standard:
    score: -20
    terms:
      - "customer engagement"
      - "digital marketing"
      - "revenue analytics"
      - "product analytics"
      - "web analytics"
